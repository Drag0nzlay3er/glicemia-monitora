<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glicemia">
<meta name="theme-color" content="#0f1117">
<title>Monitoramento Glicêmico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:#0f1117;color:#e8e4df;font-family:'DM Sans',sans-serif;min-height:100dvh;overscroll-behavior:none}
#root{display:flex;flex-direction:column;min-height:100dvh}
.app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.header{padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 16px;background:linear-gradient(160deg,#1a1f2e 0%,#0f1117 100%);border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{font-family:'DM Serif Display',serif;font-size:22px;color:#e8c4a0;letter-spacing:-0.3px}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:8px}
.header p{font-size:12px;color:#7c7a76;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:100px;font-weight:600;flex-shrink:0}
.sync-badge.synced{background:rgba(74,222,128,0.15);color:#4ade80}
.sync-badge.syncing{background:rgba(251,191,36,0.15);color:#fbbf24}
.sync-badge.error{background:rgba(248,113,113,0.15);color:#f87171}
.sync-badge.offline{background:rgba(255,255,255,0.07);color:#7c7a76}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;background:#0f1117;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:10}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:13px 16px;font-size:13px;font-weight:500;color:#5c5a56;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:#e8c4a0;border-bottom-color:#e8c4a0}
.content{flex:1;padding:20px;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px)}
.card{background:#1a1f2e;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:18px;margin-bottom:14px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#7c7a76;margin-bottom:12px;font-weight:600}
.stat-row{display:flex;gap:10px}
.stat-pill{flex:1;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 10px;text-align:center}
.stat-pill .val{font-size:26px;font-weight:600;line-height:1}
.stat-pill .unit{font-size:11px;color:#7c7a76;margin-top:3px}
.stat-pill .lbl{font-size:11px;color:#9c9a96;margin-top:6px}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#9c9a96;margin-bottom:6px;font-weight:500}
.field input,.field textarea{width:100%;background:#252b3b;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-size:16px;color:#e8e4df;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.field input:focus,.field textarea:focus{border-color:#e8c4a0}
.field textarea{resize:vertical;min-height:80px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;background:linear-gradient(135deg,#e8c4a0 0%,#d4a574 100%);color:#0f1117;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:rgba(255,255,255,0.07);color:#e8e4df;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:11px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;width:100%;margin-top:10px}
.btn-ghost{background:none;color:#9c9a96;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:11px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;width:100%;margin-top:10px}
.list-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;margin-bottom:10px}
.list-item .date{font-size:11px;color:#7c7a76;margin-bottom:7px}
.list-item .values{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.list-item .val-item{font-size:13px}
.list-item .val-item span{font-weight:600;font-size:15px}
.chart-wrap{height:180px;margin-top:8px}
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{padding:7px 14px;border-radius:100px;font-size:13px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;color:#e8e4df;-webkit-tap-highlight-color:transparent}
.chip.selected{background:rgba(232,196,160,0.2);border-color:#e8c4a0;color:#e8c4a0}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:100px;font-size:13px;font-weight:600;z-index:100;animation:toastIn .3s ease;white-space:nowrap}
.toast.success{background:#4ade80;color:#0f1117}
.toast.error{background:#f87171;color:#0f1117}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.section-title{font-family:'DM Serif Display',serif;font-size:20px;color:#e8c4a0;margin-bottom:16px;font-style:italic}
.empty{text-align:center;color:#5c5a56;font-size:14px;padding:40px 20px}
.empty .icon{font-size:40px;margin-bottom:12px}
.info-box{background:rgba(232,196,160,0.08);border:1px solid rgba(232,196,160,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:#c4a07c;margin-bottom:16px;line-height:1.7}
.warn-box{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:#fca5a5;margin-bottom:16px;line-height:1.7}
.del-btn{background:none;border:none;color:#5c5a56;cursor:pointer;font-size:16px;padding:4px;float:right;-webkit-tap-highlight-color:transparent}
.install-banner{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.25);border-radius:12px;padding:14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px}
.install-banner .icon{font-size:22px;flex-shrink:0;margin-top:1px}
.install-banner p{font-size:12px;color:#93c5fd;line-height:1.6}
.install-banner strong{display:block;font-size:13px;color:#bfdbfe;margin-bottom:3px}
.setup-wrap{padding:20px}
.setup-card{background:#1a1f2e;border:1px solid rgba(232,196,160,0.25);border-radius:16px;padding:20px;margin-bottom:14px}
.setup-card h2{font-family:'DM Serif Display',serif;font-size:20px;color:#e8c4a0;margin-bottom:6px}
.setup-card p{font-size:13px;color:#9c9a96;margin-bottom:18px;line-height:1.6}
.step{display:flex;gap:10px;margin-bottom:14px;font-size:13px;color:#c4c0bb;line-height:1.6;align-items:flex-start}
.step-num{background:rgba(232,196,160,0.2);color:#e8c4a0;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.step a{color:#60a5fa;text-decoration:none}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:16px 0}
.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.export-btn{background:#1a1f2e;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.export-btn:active{opacity:.8}
.export-btn .eb-icon{font-size:26px;margin-bottom:8px}
.export-btn .eb-title{font-size:13px;font-weight:600;color:#e8e4df;margin-bottom:3px}
.export-btn .eb-sub{font-size:11px;color:#7c7a76;line-height:1.4}
.export-btn.pdf-btn{border-color:rgba(248,113,113,0.3)}
.export-btn.html-btn{border-color:rgba(96,165,250,0.3)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useCallback}=React;
const {LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,ReferenceLine}=Recharts;

// ── Storage ───────────────────────────────────────────────────────────────────
const LS={
  get:k=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const GIST_FILE="glicemia-data.json";
async function gistLoad(token,id){
  const r=await fetch(`https://api.github.com/gists/${id}`,{headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json"}});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();const c=d.files?.[GIST_FILE]?.content;return c?JSON.parse(c):null;
}
async function gistSave(token,id,payload){
  const r=await fetch(`https://api.github.com/gists/${id}`,{method:"PATCH",headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(payload,null,2)}}})});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmt=d=>{if(!d)return"—";const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`};
const glicStatus=(v,type)=>{if(!v)return null;const n=Number(v);if(type==="jejum")return n<70?"low":n<=99?"ok":n<=125?"warn":"high";return n<70?"low":n<=139?"ok":n<=179?"warn":"high"};
const SL={ok:"Normal",warn:"Elevada",high:"Alta",low:"Baixa"};
const SC={ok:"#4ade80",warn:"#fbbf24",high:"#f87171",low:"#60a5fa"};
const TABS=["Dashboard","Registrar","Histórico","Reações","Perfil"];
const CHIPS=["Tontura","Náusea","Dor de cabeça","Suor frio","Tremor","Palpitação","Fraqueza","Visão turva","Irritabilidade","Sonolência","Fome excessiva","Formigamento","Inchaço","Dor abdominal","Sem reações"];

// ── PDF Export ────────────────────────────────────────────────────────────────
function exportPDF(profile,readings,reactions,avgJ,avgP){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,mar=18,cw=W-mar*2;
  let y=mar;

  const addPage=()=>{doc.addPage();y=mar;};
  const checkY=(need=10)=>{if(y+need>280)addPage()};

  // ── Header bar ──
  doc.setFillColor(26,31,46);
  doc.rect(0,0,210,38,`F`);
  doc.setTextColor(232,196,160);
  doc.setFontSize(20);
  doc.setFont("helvetica","bold");
  doc.text("Relatório de Monitoramento Glicêmico",mar,16);
  doc.setFontSize(9);
  doc.setFont("helvetica","normal");
  doc.setTextColor(150,148,144);
  doc.text(`Gerado em ${new Date().toLocaleDateString("pt-BR")} às ${new Date().toLocaleTimeString("pt-BR")}`,mar,24);
  if(profile.nome)doc.text(`Paciente: ${profile.nome}`,mar,30);
  y=46;

  // ── Paciente / Médico cards ──
  const drawCard=(title,lines,xStart,cardW)=>{
    doc.setFillColor(26,31,46);
    doc.roundedRect(xStart,y,cardW,8+lines.length*6,3,3,"F");
    doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(124,122,118);
    doc.text(title.toUpperCase(),xStart+4,y+5);
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(232,228,223);
    lines.forEach((l,i)=>doc.text(l,xStart+4,y+11+i*6));
    return 10+lines.length*6+4;
  };
  const half=(cw-4)/2;
  const pacLines=[profile.nome||"—",profile.dataNasc?`Nasc.: ${fmt(profile.dataNasc)}`:"",profile.remedios?`Med.: ${profile.remedios.slice(0,45)}${profile.remedios.length>45?"…":""}`:""  ].filter(Boolean);
  const medLines=[profile.medico||"—",profile.crm||"",profile.telefone_medico||""].filter(Boolean);
  const h1=drawCard("Paciente",pacLines,mar,half);
  drawCard("Médico responsável",medLines,mar+half+4,half);
  y+=Math.max(h1,10+medLines.length*6+4)+6;

  // ── Médias ──
  checkY(22);
  doc.setFillColor(26,31,46);
  doc.roundedRect(mar,y,cw,20,3,3,"F");
  doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(124,122,118);
  doc.text("MÉDIAS — ÚLTIMOS 7 REGISTROS",mar+4,y+5);
  const thirds=cw/3;
  [{label:"Jejum",val:avgJ+" mg/dL",color:[232,196,160]},{label:"Pós-prandial",val:avgP+" mg/dL",color:[192,132,252]},{label:"Registros totais",val:String(readings.length),color:[96,165,250]}]
    .forEach((item,i)=>{
      const x=mar+i*thirds;
      doc.setFontSize(14);doc.setFont("helvetica","bold");doc.setTextColor(...item.color);
      doc.text(item.val,x+4,y+14);
      doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(150,148,144);
      doc.text(item.label,x+4,y+19);
    });
  y+=26;

  // ── Tabela de leituras ──
  checkY(20);
  doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(124,122,118);
  doc.text("HISTÓRICO DE LEITURAS",mar,y);y+=5;

  // Table header
  doc.setFillColor(30,36,52);
  doc.rect(mar,y,cw,7,"F");
  doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(180,178,174);
  const cols=[mar+2,mar+28,mar+62,mar+96,mar+128];
  ["Data","Jejum","Pós-café","Peso","Observações"].forEach((h,i)=>doc.text(h,cols[i],y+5));
  y+=9;

  readings.forEach((r,idx)=>{
    checkY(8);
    if(idx%2===0){doc.setFillColor(22,27,40);doc.rect(mar,y-1,cw,7,"F")}
    const js=glicStatus(r.jejum,"jejum"),ps=glicStatus(r.pos_cafe,"pos");
    doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(200,198,194);
    doc.text(fmt(r.data),cols[0],y+4);

    if(r.jejum){
      const c=SC[js];const rgb=c==="＃4ade80"?[74,222,128]:c==="#fbbf24"?[251,191,36]:c==="#f87171"?[248,113,113]:[96,165,250];
      doc.setTextColor(...hexToRgb(SC[js]));doc.text(`${r.jejum} mg/dL`,cols[1],y+4);
    }else{doc.setTextColor(80,78,74);doc.text("—",cols[1],y+4)}

    if(r.pos_cafe){doc.setTextColor(...hexToRgb(SC[ps]));doc.text(`${r.pos_cafe} mg/dL`,cols[2],y+4);}
    else{doc.setTextColor(80,78,74);doc.text("—",cols[2],y+4)}

    doc.setTextColor(96,165,250);
    doc.text(r.peso?`${r.peso} kg`:"—",cols[3],y+4);
    doc.setTextColor(150,148,144);
    if(r.obs)doc.text(r.obs.slice(0,28)+(r.obs.length>28?"…":""),cols[4],y+4);
    y+=7;
  });
  y+=6;

  // ── Reações ──
  if(reactions.length){
    checkY(20);
    doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(124,122,118);
    doc.text("REAÇÕES REGISTRADAS",mar,y);y+=5;
    doc.setFillColor(30,36,52);
    doc.rect(mar,y,cw,7,"F");
    doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(180,178,174);
    ["Data","Remédio","Sintomas"].forEach((h,i)=>doc.text(h,[mar+2,mar+28,mar+62][i],y+5));
    y+=9;
    reactions.forEach((r,idx)=>{
      const text=[...r.chips,r.descricao].filter(Boolean).join(", ");
      const lines=doc.splitTextToSize(text,90);
      const rh=Math.max(7,lines.length*5+3);
      checkY(rh);
      if(idx%2===0){doc.setFillColor(22,27,40);doc.rect(mar,y-1,cw,rh,"F")}
      doc.setFontSize(8);doc.setFont("helvetica","normal");
      doc.setTextColor(200,198,194);doc.text(fmt(r.data),mar+2,y+4);
      doc.setTextColor(150,148,144);doc.text(r.remedio||"—",mar+28,y+4);
      doc.setTextColor(200,198,194);doc.text(lines,mar+62,y+4);
      y+=rh;
    });
    y+=4;
  }

  // ── Footer ──
  doc.setFontSize(7);doc.setTextColor(80,78,74);
  doc.text("Este relatório foi gerado automaticamente pelo app de monitoramento glicêmico.",mar,288);

  doc.save(`relatorio-glicemia-${todayStr()}.pdf`);
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}

// ── HTML Print Report ─────────────────────────────────────────────────────────
function openPrintReport(profile,readings,reactions,avgJ,avgP){
  const rows=readings.map(r=>{
    const js=glicStatus(r.jejum,"jejum"),ps=glicStatus(r.pos_cafe,"pos");
    const jColor={ok:"#16a34a",warn:"#d97706",high:"#dc2626",low:"#2563eb"}[js]||"#666";
    const pColor={ok:"#16a34a",warn:"#d97706",high:"#dc2626",low:"#2563eb"}[ps]||"#666";
    return `<tr>
      <td>${fmt(r.data)}</td>
      <td style="color:${jColor};font-weight:600">${r.jejum?r.jejum+" mg/dL":"—"}${js?` <span class="badge" style="background:${jColor}22;color:${jColor}">${SL[js]}</span>`:""}</td>
      <td style="color:${pColor};font-weight:600">${r.pos_cafe?r.pos_cafe+" mg/dL":"—"}${ps?` <span class="badge" style="background:${pColor}22;color:${pColor}">${SL[ps]}</span>`:""}</td>
      <td>${r.peso?r.peso+" kg":"—"}</td>
      <td class="obs">${r.obs||""}</td>
    </tr>`;
  }).join("");

  const rxRows=reactions.map(r=>`<tr>
    <td>${fmt(r.data)}</td>
    <td>${r.remedio||"—"}</td>
    <td>${[...r.chips,r.descricao].filter(Boolean).join(", ")}</td>
  </tr>`).join("");

  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório Glicêmico — ${profile.nome||"Paciente"}</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;color:#1a1a1a;background:#fff;padding:0}
.page{max-width:800px;margin:0 auto;padding:32px 28px}
.header{background:linear-gradient(135deg,#1a1f2e,#2d3550);color:#e8c4a0;padding:28px 28px 20px;border-radius:12px;margin-bottom:24px}
.header h1{font-family:'DM Serif Display',serif;font-size:26px;font-style:italic;margin-bottom:6px}
.header .meta{font-size:12px;color:#9ca3af;line-height:1.7}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.info-card{background:#f8f7f4;border:1px solid #e5e3df;border-radius:10px;padding:16px}
.info-card h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#9c9a96;margin-bottom:10px;font-weight:600}
.info-card p{font-size:13px;color:#333;line-height:1.8}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#f8f7f4;border:1px solid #e5e3df;border-radius:10px;padding:14px;text-align:center}
.stat-card .sv{font-size:24px;font-weight:700;line-height:1}
.stat-card .sl{font-size:11px;color:#9c9a96;margin-top:6px}
section{margin-bottom:28px}
section h2{font-family:'DM Serif Display',serif;font-size:18px;color:#1a1f2e;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #e8c4a0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a1f2e;color:#e8c4a0;padding:9px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
td{padding:9px 10px;border-bottom:1px solid #f0eeeb;vertical-align:top}
tr:nth-child(even) td{background:#faf9f7}
.badge{display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:600;margin-left:4px}
.obs{color:#888;font-size:12px}
.footer{margin-top:32px;padding-top:16px;border-top:1px solid #e5e3df;font-size:11px;color:#aaa;text-align:center}
.ref-box{background:#fffbf0;border:1px solid #fde68a;border-radius:8px;padding:12px 14px;font-size:12px;color:#92400e;margin-bottom:20px;line-height:1.6}
@media print{
  .no-print{display:none!important}
  body{padding:0}
  .page{padding:16px}
  .header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style></head><body>
<div class="page">
  <div class="no-print" style="background:#1a1f2e;padding:12px 16px;border-radius:8px;margin-bottom:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <span style="color:#e8c4a0;font-size:13px;font-weight:600;flex:1">📋 Relatório pronto para impressão ou salvar como PDF</span>
    <button onclick="window.print()" style="background:#e8c4a0;color:#0f1117;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer">Imprimir / Salvar PDF</button>
    <button onclick="window.close()" style="background:rgba(255,255,255,0.1);color:#e8e4df;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer">Fechar</button>
  </div>

  <div class="header">
    <h1>Relatório de Monitoramento Glicêmico</h1>
    <div class="meta">
      Gerado em: ${new Date().toLocaleDateString("pt-BR")} às ${new Date().toLocaleTimeString("pt-BR")}<br>
      Período: ${readings.length?fmt(readings[readings.length-1].data)+" a "+fmt(readings[0].data):"sem registros"}
    </div>
  </div>

  <div class="two-col">
    <div class="info-card">
      <h3>Paciente</h3>
      <p><strong>${profile.nome||"—"}</strong><br>
      ${profile.dataNasc?"Nasc.: "+fmt(profile.dataNasc)+"<br>":""}
      ${profile.peso_inicial?"Peso inicial: "+profile.peso_inicial+" kg<br>":""}
      ${profile.remedios?"Medicações: "+profile.remedios:""}</p>
    </div>
    <div class="info-card">
      <h3>Médico responsável</h3>
      <p><strong>${profile.medico||"—"}</strong><br>
      ${profile.crm?profile.crm+"<br>":""}
      ${profile.telefone_medico||""}</p>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="sv" style="color:#b45309">${avgJ} <span style="font-size:14px">mg/dL</span></div><div class="sl">Média Jejum (7 dias)</div></div>
    <div class="stat-card"><div class="sv" style="color:#7c3aed">${avgP} <span style="font-size:14px">mg/dL</span></div><div class="sl">Média Pós-prandial (7 dias)</div></div>
    <div class="stat-card"><div class="sv" style="color:#1a1f2e">${readings.length}</div><div class="sl">Registros totais</div></div>
  </div>

  <div class="ref-box">
    <strong>Valores de referência:</strong> Glicemia em jejum normal: 70–99 mg/dL · Glicemia pós-prandial normal (2h após refeição): &lt;140 mg/dL · Pré-diabetes (jejum): 100–125 mg/dL
  </div>

  ${readings.length?`
  <section>
    <h2>Histórico de leituras</h2>
    <table>
      <thead><tr><th>Data</th><th>Jejum</th><th>Pós-café (2h)</th><th>Peso</th><th>Observações</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </section>`:""}

  ${reactions.length?`
  <section>
    <h2>Reações a medicamentos</h2>
    <table>
      <thead><tr><th>Data</th><th>Medicamento</th><th>Sintomas relatados</th></tr></thead>
      <tbody>${rxRows}</tbody>
    </table>
  </section>`:""}

  <div class="footer">
    Relatório gerado pelo app de Monitoramento Glicêmico · ${new Date().getFullYear()} · Este documento não substitui avaliação médica.
  </div>
</div>
</body></html>`;

  const w=window.open("","_blank");
  if(w){w.document.write(html);w.document.close();}
  else alert("Permita pop-ups para abrir o relatório.");
}

      if(d){if(d.profile)setProfile(d.profile);if(d.readings)setReadings(d.readings);if(d.reactions)setReactions(d.reactions)}
      setSyncStatus("synced");setLoaded(true);
    }).catch(e=>{console.error(e);setSyncStatus("error");setLoaded(true);showToast("Erro ao carregar dados","error")});
  },[]);

  const sync=useCallback(async(p,r,rx)=>{
    if(!configured)return;setSaving(true);setSyncStatus("syncing");
    try{await gistSave(token,gistId,{profile:p,readings:r,reactions:rx,updated:new Date().toISOString()});setSyncStatus("synced")}
    catch(e){console.error(e);setSyncStatus("error");showToast("Erro ao sincronizar","error")}
    finally{setSaving(false)}
  },[configured,token,gistId,showToast]);

  const addReading=async()=>{
    if(!form.jejum&&!form.pos_cafe&&!form.peso)return;
    const entry={id:Date.now(),...form};
    const upd=[entry,...readings.filter(r=>r.data!==form.data)].sort((a,b)=>b.data.localeCompare(a.data));
    setReadings(upd);setForm({data:todayStr(),jejum:"",pos_cafe:"",peso:"",obs:""});
    showToast("✓ Registro salvo!");await sync(profile,upd,reactions);
  };
  const addReaction=async()=>{
    if(!rForm.chips.length&&!rForm.descricao)return;
    const upd=[{id:Date.now(),...rForm},...reactions];
    setReactions(upd);setRForm({data:todayStr(),remedio:"",chips:[],descricao:""});
    showToast("✓ Reação registrada!");await sync(profile,readings,upd);
  };
  const delReading=async id=>{const upd=readings.filter(r=>r.id!==id);setReadings(upd);await sync(profile,upd,reactions)};
  const delReaction=async id=>{const upd=reactions.filter(r=>r.id!==id);setReactions(upd);await sync(profile,readings,upd)};
  const saveProfile=async()=>{showToast("✓ Perfil salvo!");await sync(profile,readings,reactions)};
  const handleSetup=(t,id)=>{LS.set("gist-token",t);LS.set("gist-id",id);setToken(t);setGistId(id);showToast("✓ Gist conectado!")};
  const resetGist=()=>{if(!confirm("Tem certeza? Precisará reconfigurar."))return;LS.set("gist-token","");LS.set("gist-id","");setToken("");setGistId("");setSyncStatus("offline")};

  const avgJ=readings.filter(r=>r.jejum).slice(0,7).reduce((s,r,_,a)=>a.length?s+Number(r.jejum)/a.length:s,0).toFixed(0);
  const avgP=readings.filter(r=>r.pos_cafe).slice(0,7).reduce((s,r,_,a)=>a.length?s+Number(r.pos_cafe)/a.length:s,0).toFixed(0);
  const chartData=readings.slice(0,14).reverse().map(r=>({data:fmt(r.data).slice(0,5),Jejum:r.jejum?Number(r.jejum):undefined,"Pós-café":r.pos_cafe?Number(r.pos_cafe):undefined}));
  const last=readings[0];

  const handleExport=(type)=>{
    if(type==="pdf"){exportPDF(profile,readings,reactions,avgJ,avgP);showToast("✓ PDF gerado!");}
    else{openPrintReport(profile,readings,reactions,avgJ,avgP);}
  };

  const SLABELS={offline:"sem sync",syncing:"sincronizando…",synced:"sincronizado ✓",error:"erro de sync"};
  const hDate=new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});

  if(!configured)return React.createElement("div",{className:"app"},
    React.createElement("div",{className:"header"},React.createElement("h1",null,"🩸 Monitoramento Glicêmico")),
    React.createElement(Setup,{onSave:handleSetup})
  );
  if(!loaded)return React.createElement("div",{className:"app"},
    React.createElement("div",{className:"header"},React.createElement("h1",null,"🩸 Monitoramento Glicêmico")),
    React.createElement("div",{className:"empty"},React.createElement("div",{className:"icon"},"⏳"),React.createElement("p",null,"Carregando dados do GitHub..."))
  );

  return React.createElement("div",{className:"app"},
    React.createElement("div",{className:"header"},
      React.createElement("h1",null,"🩸 Monitoramento Glicêmico"),
      React.createElement("div",{className:"header-row"},
        React.createElement("p",null,`${profile.nome||"Configure o perfil"} · ${hDate}`),
        React.createElement("span",{className:`sync-badge ${syncStatus}`},SLABELS[syncStatus])
      )
    ),
    React.createElement("div",{className:"tabs"},TABS.map(t=>React.createElement("button",{key:t,className:`tab-btn ${tab===t?"active":""}`,onClick:()=>setTab(t)},t))),
    React.createElement("div",{className:"content"},
      tab==="Dashboard"&&React.createElement(TabDashboard,{readings,chartData,last,avgJ,avgP,reactions,onExport:handleExport}),
      tab==="Registrar"&&React.createElement(TabRegistrar,{form,setForm,addReading,saving}),
      tab==="Histórico"&&React.createElement(TabHistorico,{readings,del:delReading}),
      tab==="Reações"&&React.createElement(TabReacoes,{rForm,setRForm,add:addReaction,reactions,del:delReaction,saving}),
      tab==="Perfil"&&React.createElement(TabPerfil,{profile,setProfile,save:saveProfile,saving,resetGist,onExport:handleExport})
    ),
    toast&&React.createElement("div",{className:`toast ${toast.type}`},toast.msg)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
