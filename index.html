  padding-left:calc(env(safe-area-inset-left,0px) + 20px);
  padding-right:calc(env(safe-area-inset-right,0px) + 20px);

.header h1{font-family:'DM Serif Display',serif;font-size:22px;color:#e8c4a0;letter-spacing:-0.3px}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:8px}
.header p{font-size:12px;color:#7c7a76;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:100px;font-weight:600;flex-shrink:0}
.sync-badge.synced{background:rgba(74,222,128,0.15);color:#4ade80}
.sync-badge.syncing{background:rgba(251,191,36,0.15);color:#fbbf24}
.sync-badge.error{background:rgba(248,113,113,0.15);color:#f87171}
.sync-badge.offline{background:rgba(255,255,255,0.07);color:#7c7a76}

.content{
  flex:1;padding:20px;overflow-y:auto;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);

.setup-wrap{padding:20px}

.divider{height:1px;background:rgba(255,255,255,0.06);margin:16px 0}

.med-time{font-size:11px;color:#7c7a76;margin-top:2px}
.alarm-banner{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.alarm-banner .icon{font-size:24px;flex-shrink:0}
.alarm-banner .text{flex:1}
.alarm-banner .title{font-size:14px;font-weight:600;color:#fbbf24}
.alarm-banner .sub{font-size:12px;color:#9c9a96;margin-top:2px}

.chart-svg{width:100%;height:160px;overflow:visible}
.chart-tooltip{position:absolute;background:#252b3b;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:10;white-space:nowrap}
.rx-tag{display:inline-block;background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.3);color:#c084fc;border-radius:100px;padding:2px 8px;font-size:11px;margin:2px}

/* Offline indicator */
.offline-bar{background:#f87171;color:#0f1117;text-align:center;font-size:12px;font-weight:600;padding:6px;display:none}

.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.pin-sheet{background:#1a1f2e;border-radius:20px 20px 0 0;padding:28px 24px calc(env(safe-area-inset-bottom,0px) + 28px);width:100%;max-width:480px}
.pin-title{font-family:'DM Serif Display',serif;font-size:20px;color:#e8c4a0;margin-bottom:6px;text-align:center}

.pin-dot.filled{background:#e8c4a0;border-color:#e8c4a0}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-btn{background:rgba(255,255,255,0.06);border:none;border-radius:12px;padding:18px;font-size:22px;font-weight:600;color:#e8e4df;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;transition:background .1s}
.pin-btn:active{background:rgba(255,255,255,0.14)}
.pin-btn.del{font-size:18px;color:#7c7a76}
.pin-btn.empty{background:none;cursor:default}
.pin-error{color:#f87171;font-size:13px;text-align:center;margin-top:10px}
/* Switcher button in header */
.switch-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 10px;font-size:11px;color:#9c9a96;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
</style>
</head>

  // Se houver parâmetros na URL, salva-os no LocalStorage e limpa a URL para segurança
  if (urlToken && urlId) {
    LS.set("gist-token", urlToken);
    LS.set("gist-id", urlId);
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  const [token, setToken] = useState(LS.get("gist-token") || "");

  const [activeTab, setActiveTab] = useState("Dashboard");
  const [profiles, setProfiles] = useState([]);

  const [toast, setToast] = useState(null);
  const [showSwitcher, setShowSwitcher] = useState(false);

  const showToast = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };

    if (!token || !gistId) return;
    setSyncStatus("syncing");
    try {
      const data = await gistLoad(token, gistId);
      if (data && data.profiles) {
        setProfiles(data.profiles);
        // Tenta manter o perfil ativo se ele já existia
        if (activeProfile) {
          const updated = data.profiles.find(p => p.id === activeProfile.id);
          if (updated) setActiveProfile(updated);
        }
      }
      setSyncStatus("synced");
    } catch (e) {
      setSyncStatus("error");
      showToast("Erro ao sincronizar", "error");
    }

    setSyncStatus("syncing");

    } catch (e) {
      setSyncStatus("error");

              React.createElement("div", { className: "med-info" },
                React.createElement("div", { className: "med-name" }, m.name),
                React.createElement("div", { className: "med-time" }, `${m.alarm} — ${m.dose}`)
              )
            );
          })
      )
    );
  };

  const renderRegister = () => {
    const [formData, setFormData] = useState({
      data: todayStr(), jejum: "", pos_cafe: "", peso: "", rxObs: "", rxChips: []
    });

    const saveEntry = () => {
      let newLogs = [...(activeProfile.logs || [])];
      const idx = newLogs.findIndex(l => l.data === formData.data);
      if (idx > -1) {
        newLogs[idx] = { ...newLogs[idx], ...formData };
      } else {
        newLogs.unshift(formData);
        newLogs.sort((a, b) => b.data.localeCompare(a.data));
      }
      updateProfile({ ...activeProfile, logs: newLogs });
      showToast("Registrado com sucesso!");
      setActiveTab("Dashboard");
    };

    return React.createElement("div", null,
      React.createElement("div", { className: "card" },
        React.createElement("div", { className: "field" },
          React.createElement("label", null, "Data"),
          React.createElement("input", { type: "date", value: formData.data, onChange: e => setFormData({ ...formData, data: e.target.value }) })
        ),
        React.createElement("div", { className: "row-2" },
          React.createElement("div", { className: "field" },
            React.createElement("label", null, "Jejum (mg/dL)"),
            React.createElement("input", { type: "number", inputMode: "numeric", value: formData.jejum, onChange: e => setFormData({ ...formData, jejum: e.target.value }) })
          ),
          React.createElement("div", { className: "field" },
            React.createElement("label", null, "Pós-café (mg/dL)"),
            React.createElement("input", { type: "number", inputMode: "numeric", value: formData.pos_cafe, onChange: e => setFormData({ ...formData, pos_cafe: e.target.value }) })
          )
        ),
        React.createElement("div", { className: "field" },
          React.createElement("label", null, "Peso (kg)"),
          React.createElement("input", { type: "number", step: "0.1", value: formData.peso, onChange: e => setFormData({ ...formData, peso: e.target.value }) })
        ),
        React.createElement("div", { className: "card-title" }, "Reações / Sintomas"),
        React.createElement("div", { className: "chip-grid" },
          REACTION_CHIPS.map(c => React.createElement("div", {
            key: c,
            className: `chip ${formData.rxChips.includes(c) ? "selected" : ""}`,
            onClick: () => {
              const nc = formData.rxChips.includes(c) ? formData.rxChips.filter(x => x !== c) : [...formData.rxChips, c];
              setFormData({ ...formData, rxChips: nc });
            }
          }, c))
        ),
        React.createElement("button", { className: "btn-primary", onClick: saveEntry }, "Salvar Registro")
      )
    );
  };

  const renderHistory = () => {
    const logs = activeProfile.logs || [];
    return React.createElement("div", null,
      logs.length === 0 ? React.createElement("div", { className: "empty" }, "Nenhum registro encontrado.") :
        logs.map((l, i) => React.createElement("div", { key: i, className: "list-item" },
          React.createElement("button", {
            className: "del-btn", onClick: () => {
              if (confirm("Excluir este registro?")) {
                updateProfile({ ...activeProfile, logs: logs.filter((_, idx) => idx !== i) });
              }
            }
          }, "×"),
          React.createElement("div", { className: "date" }, fmt(l.data)),
          React.createElement("div", { className: "values" },
            l.jejum && React.createElement("div", { className: "val-item" }, "Jejum: ", React.createElement("span", { style: { color: SC[glicStatus(l.jejum, "jejum")] } }, l.jejum)),
            l.pos_cafe && React.createElement("div", { className: "val-item" }, "Pós: ", React.createElement("span", { style: { color: SC[glicStatus(l.pos_cafe, "pos")] } }, l.pos_cafe)),
            l.peso && React.createElement("div", { className: "val-item" }, "Peso: ", React.createElement("span", { style: { color: "#60a5fa" } }, l.peso, "kg"))
          ),
          l.rxChips?.length > 0 && React.createElement("div", { style: { marginTop: 8 } },
            l.rxChips.map(c => React.createElement("span", { key: c, className: "rx-tag" }, c))
          )
        ))
    );
  };

  const renderProfile = () => {
    return React.createElement("div", null,
      React.createElement("div", { className: "card" },
        React.createElement("div", { className: "card-title" }, "Dados do Paciente"),
        React.createElement("div", { className: "field" },
          React.createElement("label", null, "Nome Completo"),
          React.createElement("input", { value: activeProfile.nome || "", onChange: e => updateProfile({ ...activeProfile, nome: e.target.value }) })
        ),
        React.createElement("button", {
          className: "btn-secondary", onClick: () => {
            const logs = activeProfile.logs || [];
            const last7 = logs.slice(0, 7);
            const avgJ = last7.length ? Math.round(last7.reduce((a, b) => a + (Number(b.jejum) || 0), 0) / last7.filter(l => l.jejum).length || 0) : 0;
            const avgP = last7.length ? Math.round(last7.reduce((a, b) => a + (Number(b.pos_cafe) || 0), 0) / last7.filter(l => l.pos_cafe).length || 0) : 0;
            openPrintReport(activeProfile, logs, avgJ, avgP);
          }
        }, "Gerar Relatório de Impressão"),
        React.createElement("button", {
          className: "btn-ghost", onClick: () => {
            if (confirm("Deseja sair e trocar de perfil?")) { setScreen("profiles"); setActiveProfile(null); }
          }
        }, "Trocar Perfil"),
        React.createElement("button", {
          className: "btn-ghost", style: { color: "#f87171", borderColor: "rgba(248,113,113,0.2)" },
          onClick: () => {
            if (confirm("Limpar todas as configurações do app?")) {
              localStorage.clear(); window.location.reload();
            }
          }
        }, "Resetar Aplicativo")
      )
    );
  };

  return React.createElement("div", { className: "app" },
    React.createElement("header", { className: "header" },
      React.createElement("div", { className: "header-row" },
        React.createElement("h1", null, "Glicemia"),
        React.createElement("div", { className: `sync-badge ${syncStatus}` }, 
          syncStatus === "synced" ? "● Sincronizado" : syncStatus === "syncing" ? "○ Gravando..." : "× Erro Sync")
      ),
      React.createElement("div", { className: "header-row", style: { marginTop: 10 } },
        React.createElement("p", null, activeProfile?.nome || "Bem-vindo"),
        React.createElement("button", { className: "switch-btn", onClick: () => setScreen("profiles") }, "Trocar Perfil ⇄")
      )
    ),
    React.createElement("div", { className: "tabs" },
      TABS.map(t => React.createElement("button", {
        key: t,
        className: `tab-btn ${activeTab === t ? "active" : ""}`,
        onClick: () => setActiveTab(t)
      }, t))
    ),
    React.createElement("main", { className: "content" },
      activeTab === "Dashboard" && renderDashboard(),
      activeTab === "Registrar" && renderRegister(),
      activeTab === "Histórico" && renderHistory(),
      activeTab === "Perfil" && renderProfile()
    ),
    toast && React.createElement("div", { className: `toast ${toast.type}` }, toast.msg),
    screen === "pin-admin" && React.createElement(PinModal, { 
      onSuccess: handlePinSuccess, 
      onCancel: () => setScreen("profiles") 
    })
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
