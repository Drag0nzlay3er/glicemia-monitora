const {useState, useEffect, useCallback} = React;

const CONFIG = {
    TOKEN: "COLE_AQUI_SEU_GITHUB_TOKEN", 
    GIST_ID: "COLE_AQUI_O_ID_DO_SEU_GIST"
};

            setLoading(false);
            return;
        }
        try {
            const r = await fetch(`https://api.github.com/gists/${CONFIG.GIST_ID}`, {
                headers: { 'Authorization': `token ${CONFIG.TOKEN}`, 'Cache-Control': 'no-cache' }
            });
            const g = await r.json();
            const content = g.files["glicemia-data.json"]?.content;
            
            if (content) {
                setData(JSON.parse(content));
            } else {
                setData({ profiles: [{ id: "admin", nome: "Wagner", logs: [] }] });
            }
        } catch (e) {
            console.error("Erro na conexão");
        } finally {
            setLoading(false);
        }
    }, []);
