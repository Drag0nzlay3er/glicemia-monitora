<script>
const {useState,useEffect,useCallback,useRef}=React;

  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const GIST_FILE="glicemia-data.json";
async function gistLoad(token,id){
  const r=await fetch(`https://api.github.com/gists/${id}`,{headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json"}});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();const c=d.files?.[GIST_FILE]?.content;return c?JSON.parse(c):null;
}
async function gistSave(token,id,payload){
  const r=await fetch(`https://api.github.com/gists/${id}`,{method:"PATCH",headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(payload,null,2)}}})});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
}
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmt=d=>{if(!d)return"—";const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`};
const glicStatus=(v,type)=>{if(!v)return null;const n=Number(v);if(type==="jejum")return n<70?"low":n<=99?"ok":n<=125?"warn":"high";return n<70?"low":n<=139?"ok":n<=179?"warn":"high"};
const SL={ok:"Normal",warn:"Elevada",high:"Alta",low:"Baixa"};
const SC={ok:"#4ade80",warn:"#fbbf24",high:"#f87171",low:"#60a5fa"};
const TABS=["Dashboard","Registrar","Histórico","Perfil"];
const MEDS=[
  {id:"rybelsus",name:"Rybelsus",dose:"1 comprimido",time:"06:00",label:"Em jejum ao acordar",color:"#e8c4a0",alarm:"06:00"},
  {id:"metf_manha",name:"Metformina",dose:"1 comprimido",time:"Após café",label:"Após café da manhã",color:"#60a5fa",alarm:"08:00"},
  {id:"metf_almoco",name:"Metformina",dose:"1 comprimido",time:"Após almoço",label:"Após almoço",color:"#60a5fa",alarm:"12:30"},
  {id:"metf_jantar",name:"Metformina",dose:"1 comprimido",time:"Após jantar",label:"Após jantar",color:"#60a5fa",alarm:"19:30"},
];
const REACTION_CHIPS=["Tontura","Náusea","Dor de cabeça","Suor frio","Tremor","Palpitação","Fraqueza","Visão turva","Irritabilidade","Sonolência","Fome excessiva","Formigamento","Inchaço","Dor abdominal","Sem reações"];

function LineChart({data}){
  const[tip,setTip]=useState(null);
  if(!data||data.length<2)return null;
  const W=320,H=150,pL=36,pR=10,pT=16,pB=26;
  const cw=W-pL-pR,ch=H-pT-pB;
  const all=data.flatMap(d=>[d.j,d.p].filter(v=>v!=null));
  const minV=Math.min(...all,60),maxV=Math.max(...all,160);
  const rng=maxV-minV||1;
  const px=i=>pL+i*(cw/(data.length-1));
  const py=v=>pT+ch-(((v-minV)/rng)*ch);
  const lineD=key=>data.map((d,i)=>{const v=d[key];if(v==null)return null;return`${i===0||data[i-1][key]==null?"M":"L"}${px(i).toFixed(1)},${py(v).toFixed(1)}`}).filter(Boolean).join(" ");
  const grids=Array.from({length:4},(_,i)=>Math.round(minV+(rng/3)*i));
  const refs=[{v:100,c:"#fbbf24"},{v:140,c:"#f87171"}].filter(r=>r.v>=minV&&r.v<=maxV);
  return React.createElement("div",{className:"chart-container"},
    React.createElement("svg",{viewBox:`0 0 ${W} ${H}`,className:"chart-svg",onMouseLeave:()=>setTip(null),onTouchEnd:()=>setTimeout(()=>setTip(null),2000)},
      grids.map(v=>React.createElement("g",{key:v},React.createElement("line",{x1:pL,x2:W-pR,y1:py(v),y2:py(v),stroke:"rgba(255,255,255,0.05)",strokeWidth:1}),React.createElement("text",{x:pL-4,y:py(v)+4,textAnchor:"end",fontSize:9,fill:"#7c7a76"},v))),
      refs.map(r=>React.createElement("line",{key:r.v,x1:pL,x2:W-pR,y1:py(r.v),y2:py(r.v),stroke:r.c,strokeWidth:1,strokeDasharray:"4 3"})),
      data.map((d,i)=>(i===0||i===data.length-1||i===Math.floor(data.length/2))&&React.createElement("text",{key:i,x:px(i),y:H-4,textAnchor:"middle",fontSize:9,fill:"#7c7a76"},d.label)),
      React.createElement("path",{d:lineD("j"),fill:"none",stroke:"#e8c4a0",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"}),
      React.createElement("path",{d:lineD("p"),fill:"none",stroke:"#c084fc",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"}),
      data.map((d,i)=>React.createElement(React.Fragment,{key:i},
        d.j!=null&&React.createElement("circle",{cx:px(i),cy:py(d.j),r:3,fill:"#e8c4a0",onMouseEnter:()=>setTip({x:px(i),y:py(d.j),d}),onTouchStart:()=>setTip({x:px(i),y:py(d.j),d})}),
        d.p!=null&&React.createElement("circle",{cx:px(i),cy:py(d.p),r:3,fill:"#c084fc",onMouseEnter:()=>setTip({x:px(i),y:py(d.p),d}),onTouchStart:()=>setTip({x:px(i),y:py(d.p),d})})
      )),
      React.createElement("circle",{cx:pL+4,cy:pT+5,r:3,fill:"#e8c4a0"}),React.createElement("text",{x:pL+10,y:pT+9,fontSize:8,fill:"#e8c4a0"},"Jejum"),
      React.createElement("circle",{cx:pL+44,cy:pT+5,r:3,fill:"#c084fc"}),React.createElement("text",{x:pL+50,y:pT+9,fontSize:8,fill:"#c084fc"},"Pós-café"),
      React.createElement("line",{x1:W-76,x2:W-66,y1:pT+5,y2:pT+5,stroke:"#fbbf24",strokeWidth:1.5,strokeDasharray:"3 2"}),React.createElement("text",{x:W-62,y:pT+9,fontSize:8,fill:"#fbbf24"},"100"),
      React.createElement("line",{x1:W-42,x2:W-32,y1:pT+5,y2:pT+5,stroke:"#f87171",strokeWidth:1.5,strokeDasharray:"3 2"}),React.createElement("text",{x:W-28,y:pT+9,fontSize:8,fill:"#f87171"},"140")
    ),
    tip&&React.createElement("div",{className:"chart-tooltip",style:{left:Math.min(tip.x+8,220),top:tip.y-44}},
      React.createElement("div",{style:{color:"#7c7a76",marginBottom:3}},tip.d.label),
      tip.d.j!=null&&React.createElement("div",{style:{color:"#e8c4a0"}},`Jejum: ${tip.d.j} mg/dL`),
      tip.d.p!=null&&React.createElement("div",{style:{color:"#c084fc"}},`Pós: ${tip.d.p} mg/dL`)
    )
  );
}

function requestNotifPermission(cb){
  if(!("Notification" in window)){cb(false);return;}
  if(Notification.permission==="granted"){cb(true);return;}
  Notification.requestPermission().then(p=>cb(p==="granted"));
}
function fireNotif(title,body){
  if(Notification.permission==="granted"){
    try{new Notification(title,{body,icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🩸</text></svg>"})}catch(e){}
  }
}
function useAlarmTick(logs){
  useEffect(()=>{
    if(!LS.get("alarms-enabled"))return;
    const tick=()=>{
      const now=new Date();
      const hm=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      const todayLog=logs.find(l=>l.data===todayStr());
      MEDS.forEach(med=>{if(med.alarm===hm){const taken=todayLog?.meds?.[med.id];if(!taken)fireNotif(`💊 Hora do ${med.name}`,med.label);}});
    };
    const id=setInterval(tick,60000);return()=>clearInterval(id);
  },[logs]);
}

function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]}
function exportPDF(profile,logs,avgJ,avgP){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,mar=18,cw=W-mar*2;let y=mar;
  const checkY=(n=10)=>{if(y+n>280){doc.addPage();y=mar;}};
  doc.setFillColor(26,31,46);doc.rect(0,0,210,38,"F");
  doc.setTextColor(232,196,160);doc.setFontSize(18);doc.setFont("helvetica","bold");
  doc.text("Relatório de Monitoramento Glicêmico",mar,15);
  doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(150,148,144);
  doc.text(`Gerado em: ${new Date().toLocaleDateString("pt-BR")} às ${new Date().toLocaleTimeString("pt-BR")}`,mar,23);
  if(profile.nome)doc.text(`Paciente: ${profile.nome}`,mar,30);

<!-- Service Worker Registration -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/glicemia-monitora/service-worker.js')
      .then(reg=>{
        console.log('[SW] Registrado:',reg.scope);
        // Check for updates
        reg.addEventListener('updatefound',()=>{
          const newWorker=reg.installing;
          newWorker.addEventListener('statechange',()=>{
            if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
              console.log('[SW] Nova versão disponível');
            }
          });
        });
      })
      .catch(err=>console.warn('[SW] Falha no registro:',err));
  });
  // Online/offline indicator
  const updateOnline=()=>document.body.classList.toggle('is-offline',!navigator.onLine);
  window.addEventListener('online',updateOnline);
  window.addEventListener('offline',updateOnline);
  updateOnline();
}
</script>
